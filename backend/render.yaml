services:
  - type: web
    name: id-extractor-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.onrender.com
      - key: PORT
        value: 8000
    region: oregon
    plan: free
